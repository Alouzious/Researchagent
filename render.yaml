services:
  - type: web
    name: ai-research-agent
    env: python
    region: oregon 
    plan: free # 
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GROQ_API_KEY
        sync: false 
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
        value: "" 
      - key: PYTHON_VERSION
        value: 3.11.0
